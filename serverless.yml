service: geo-finance-backend

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-south-1
  environment:
    NODE_ENV: production
    DATABASE_URL: ${env:DATABASE_URL, ''}
    JWT_SECRET: ${env:JWT_SECRET, ''}
    SMS_PROVIDER: ${env:SMS_PROVIDER, ''}
    TWILIO_ACCOUNT_SID: ${env:TWILIO_ACCOUNT_SID, ''}
    TWILIO_AUTH_TOKEN: ${env:TWILIO_AUTH_TOKEN, ''}
    TWILIO_VERIFY_SERVICE_SID: ${env:TWILIO_VERIFY_SERVICE_SID, ''}
    GEMINI_API_KEY: ${env:GEMINI_API_KEY, ''}
    SQS_SMS_QUEUE_URL: !Ref SmsQueue

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - sqs:SendMessage
          Resource: !GetAtt SmsQueue.Arn

functions:
  api:
    handler: server.handler
    timeout: 30
    memorySize: 512
    events:
      - httpApi: '*'

  aiSmsWorker:
    handler: src/workers/aiSmsWorker.handler
    timeout: 30
    memorySize: 512
    events:
      - sqs:
          arn: !GetAtt SmsQueue.Arn
          batchSize: 10

  smsBatchCron:
    handler: src/workers/smsBatchCron.handler
    timeout: 60
    memorySize: 512
    events:
      # 3:00 PM IST is 9:30 AM UTC -> cron(30 9 * * ? *)
      - schedule: cron(30 9 * * ? *)
      # 9:00 PM IST is 3:30 PM UTC -> cron(30 15 * * ? *)
      - schedule: cron(30 15 * * ? *)

resources:
  Resources:
    SmsQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: GeoFinanceSmsQueue-${sls:stage}
